[package]
name = "example-plugin"
version = "0.1.0"
edition = "2024"

[lib]
name = "example_plugin"
path = "src/lib.rs"

[dependencies]
dsl = { path = "../../crates/dsl" }
dsl-ui = { path = "../../crates/ui" }
node-graph = { path = "../../crates/node_graph" }
egui = "0.35"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
crossbeam-channel = "0.5"
