[workspace]
members = [".", "crates/dsl", "crates/node_graph", "crates/ui"]
default-members = ["."]
resolver = "2"

[package]
name = "dsl-examples"
version = "0.1.0"
edition = "2024"
publish = false
autobins = false
default-run = "dsl-ui"

[[bin]]
name = "dsl-ui"
path = "crates/ui/src/main.rs"

[dependencies]
dsl = { path = "crates/dsl" }
dsl-ui = { path = "crates/ui" }
clap = { version = "4.6.1", features = ["derive"] }
crossbeam-channel = "0.5.16"
tracing = "0.1"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
memmap2 = "0.9.11"
minifb = "0.28"
node-graph = { path = "crates/node_graph" }
eframe = "0.35"
egui = "0.35"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tempfile = "3.27.0"

[profile.release]
debug = true
