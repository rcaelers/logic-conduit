name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install UI symbol font
        run: sudo apt-get update && sudo apt-get install --yes fonts-noto-core
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Check Rust module structure
        run: ruby scripts/check_rust_module_structure.rb
      - name: Check UI processing boundary
        run: |
          if rg -n 'logic-analyzer-processing|logic_analyzer_processing' crates/logic_analyzer_ui; then
            echo 'logic_analyzer_ui must consume concrete processing behavior through logic_analyzer_graph'
            exit 1
          fi
      - name: Check architectural visibility
        env:
          RUSTFLAGS: -D unreachable-pub
        run: cargo check --workspace --all-targets
      - name: Test workspace
        run: cargo test --workspace

  check-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Check wasm UI, dependencies, and plugin contracts
        env:
          RUSTFLAGS: -D unreachable-pub
        run: cargo check -p logic-analyzer-app-web -p example-plugin --target wasm32-unknown-unknown
