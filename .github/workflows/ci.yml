name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install UI symbol font
        run: sudo apt-get update && sudo apt-get install --yes fonts-noto-core
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Test workspace
        run: cargo test --workspace

  check-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Check wasm UI and dependencies
        run: cargo check -p logic-analyzer-app-web --target wasm32-unknown-unknown
